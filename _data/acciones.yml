- id: concentracion-moral-mar24
  nombre: Concentración en la Plaza de la Constitución de Moralzarzal
  descripcion: |
    La Sierra con Palestina se suma a la concentración en la Plaza de la Constitución de Moralzarzal el sábado 16 de marzo a mediodía.

    Más de 500 personas participaron durante la jornada y se unieron en un espíritu humanitario dejando de lado discursos de odio. Vecinos de la localidad y de la Sierra se sumaron a diferentes actividades para todos los públicos como cuentacuentos, conciertos, diálogo con activistas y comidas populares.

    Una batucada recorrió las calles del centro denunciando el sufrimiento del pueblo palestino y en concreto el asesinato de más de 15.000 niños y niñas palestinos en el genocidio perpetrado por el Estado de Israel.
  fecha: 2024-03-16

- id: jornada-solidaridad-gordoloba-mar24
  nombre: Jornada en solidaridad con el pueblo palestino en la Gordoloba
  descripcion: |
    El domingo 17 de marzo organizamos una [jornada en solidaridad con el pueblo palestino](https://aquienlasierra.es/collado-villalba/plataforma-sierra-palestina-jornada-ludica-e-informativa-en-collado-villalba) en la Gordoloba de Collado Villalba, que incluyó:
      - Asamblea abierta.
      - Mural participativo con el artista Elías Taño.
      - Música con Mil i María.
      - Recaudación de fondos para las actividades de la plataforma y el apoyo a Palestina.
      - Actividades de pintura para niños.
      - Taller de chapas.
      - Micrófono abierto, poesía y más...
  fecha: 2024-03-17
